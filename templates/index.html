<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Calculator</h1>

        <form method="POST">

            <input type="number" step="any"
                   name="num1"
                   placeholder="First Number"
                   required>

            <select name="operation">
                <option value="+">+</option>
                <option value="-">−</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>

            <input type="number" step="any"
                   name="num2"
                   placeholder="Second Number"
                   required>

            <button type="submit">Calculate</button>

        </form>

        {% if result is not none %}
            <h2>Result: {{ result }}</h2>
        {% endif %}

    </div>

</body>
</html>
